[tox]
min_version = 4.20
env_list = format, lint, type, py, coverage, spell, schemas, viewer-smoke
skip_missing_interpreters = false

[testenv]
description = QAVE quality gates orchestrated through uv.
skip_install = true
allowlist_externals =
    uv
    git
    bash
    xvfb-run
    ./viewer/scripts/install_processing_cli.sh
    ./viewer/scripts/install_processing_peasycam.sh
    ./viewer/scripts/run_processing.sh
pass_env =
    HOME
    PATH
    DISPLAY
    JAVA_TOOL_OPTIONS
    QAVE_PROCESSING_SKETCHBOOK
    QAVE_JVM_ERROR_DIR
setenv =
    UV_PROJECT_ENVIRONMENT = {env_dir}
    QAVE_PROCESSING_DIR = {toxinidir}/artifacts/tooling/processing/processing-4.5.2/bin
    PATH = {env:QAVE_PROCESSING_DIR}:{env:PATH}
commands_pre =
    uv sync --project backend --extra dev --frozen

[testenv:lint]
description = Run lint and documentation/header checks.
commands =
    uv run --project backend ruff check backend/src backend/tests
    uv run --project backend ruff check viewer/scripts --select D --config backend/pyproject.toml
    {envpython} viewer/scripts/check_doc_headers.py

[testenv:format]
description = Auto-format Python sources and viewer scripts.
commands =
    uv run --project backend ruff format backend/src backend/tests viewer/scripts --config backend/pyproject.toml

[testenv:type]
description = Run static type checks with mypy.
commands =
    uv run --project backend mypy --config-file backend/pyproject.toml backend/src backend/tests

[testenv:py]
description = Run backend unit and integration tests on Python 3.12.
base_python = python3.12
commands =
    uv run --project backend pytest {posargs}

[testenv:coverage]
description = Run backend tests with enforced coverage threshold.
base_python = python3.12
commands =
    uv run --project backend coverage erase
    uv run --project backend coverage run --source=qave,qave_backend -m pytest {posargs}
    uv run --project backend coverage report --fail-under=90

[testenv:spell]
description = Run repository-wide spelling checks.
commands =
    uv run --project backend typos --config {toxinidir}/.typos.toml .

[testenv:schemas]
description = Export schemas and ensure contracts are committed.
commands =
    uv run --project backend qave-export-schemas
    git diff --exit-code -- contracts/schemas

[testenv:viewer-smoke]
description = Run deterministic viewer smoke checks.
commands =
    bash viewer/scripts/install_processing_cli.sh
    bash viewer/scripts/install_processing_peasycam.sh
    uv run --project backend ruff check viewer/scripts --select D --config backend/pyproject.toml
    {envpython} viewer/scripts/check_doc_headers.py
    uv run --project backend python -c "from pathlib import Path; from qave import ArtifactOptions, SimulationOptions, generate_trace_from_qiskit; from qave.examples import build_ghz; generate_trace_from_qiskit(build_ghz(qubits=3, measure=True), options=SimulationOptions(algorithm_id='ghz', mode='preview', shot_count=100, measurement_mode='collapse'), artifacts=ArtifactOptions(out_dir=Path('viewer/processing_qave/data'), write_result_json=False))"
    {envpython} viewer/scripts/check_circuit_lens.py --trace viewer/processing_qave/data/trace.json
    {envpython} viewer/scripts/check_density_layers.py --trace viewer/processing_qave/data/trace.json
    {envpython} viewer/scripts/check_measurement_shot_replay.py --trace viewer/processing_qave/data/trace.json
    {envpython} viewer/scripts/check_gate_decomposition_overlay.py --trace viewer/processing_qave/data/trace.json
    {envpython} viewer/scripts/check_camera_jumps.py --trace viewer/processing_qave/data/trace.json
    bash -ec 'if command -v xvfb-run >/dev/null 2>&1; then LIBGL_ALWAYS_SOFTWARE=1 LIBGL_DRI3_DISABLE=1 MESA_LOADER_DRIVER_OVERRIDE=llvmpipe xvfb-run -a bash viewer/scripts/run_processing.sh --trace viewer/processing_qave/data/trace.json --autoplay true --speed 1 --max-frames 120 --record none; else LIBGL_ALWAYS_SOFTWARE=1 LIBGL_DRI3_DISABLE=1 MESA_LOADER_DRIVER_OVERRIDE=llvmpipe bash viewer/scripts/run_processing.sh --trace viewer/processing_qave/data/trace.json --autoplay true --speed 1 --max-frames 120 --record none; fi'
    {envpython} viewer/scripts/check_camera_jumps.py --trace viewer/processing_qave/data/trace.json
    {envpython} viewer/scripts/check_measurement_shot_replay.py --trace viewer/processing_qave/data/trace.json
