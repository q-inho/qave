name: backend-ci

on:
  pull_request:
    paths:
      - "backend/**"
      - "contracts/schemas/**"
      - ".typos.toml"
      - "tox.ini"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "contracts/schemas/**"
      - ".typos.toml"
      - "tox.ini"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Tox backend gates
        run: uvx tox -e format,lint,type,py,coverage,spell,schemas

      - name: Fail if formatting changed tracked files
        run: git diff --exit-code
