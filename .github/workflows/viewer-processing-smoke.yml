name: viewer-processing-smoke

on:
  pull_request:
    paths:
      - "viewer/**"
      - "backend/**"
      - "tox.ini"
      - ".github/workflows/viewer-processing-smoke.yml"
  push:
    branches: ["main"]
    paths:
      - "viewer/**"
      - "backend/**"
      - "tox.ini"
      - ".github/workflows/viewer-processing-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Tox viewer smoke
        run: uvx tox -e viewer-smoke
